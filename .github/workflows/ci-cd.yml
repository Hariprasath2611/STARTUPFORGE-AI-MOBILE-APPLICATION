name: StartupForge CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          cache-dependency-path: backend/package.json
      - name: Install dependencies
        run: cd backend && npm install
      - name: Run compilation & lint
        run: cd backend && npm run build

  mobile-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          cache-dependency-path: mobile/package.json
      - name: Install dependencies
        run: cd mobile && npm install
      - name: TypeScript Check
        run: cd mobile && npx tsc --noEmit

  python-services-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install AI dependencies
        run: |
          cd ai-service
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run AI service syntax compile
        run: python -m py_compile ai-service/app/main.py
      - name: Install ML dependencies
        run: |
          cd ml-service
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run ML service syntax compile
        run: python -m py_compile ml-service/app/main.py
